# Air — Go hot-reload configuration
# https://github.com/air-verse/air

root = "."
tmp_dir = ".air"

[build]
  cmd              = "go build -o .air/teamsens ./cmd/api"
  bin              = ".air/teamsens"
  full_bin         = ".air/teamsens"
  include_ext      = ["go"]
  exclude_dir      = ["web", "vendor", ".air", "static"]
  exclude_regex    = ["_test\\.go$"]
  delay            = 500          # ms — debounce to avoid double-builds
  kill_delay       = "200ms"
  send_interrupt   = true
  stop_on_error    = true
  rerun            = false
  log              = "air.log"

[log]
  time             = false
  main_only        = false

[color]
  main             = "magenta"
  watcher          = "cyan"
  build            = "yellow"
  runner           = "green"

[misc]
  clean_on_exit    = true
