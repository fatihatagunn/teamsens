# Google Cloud Build — CI/CD pipeline for TeamSens
#
# Trigger: push to the `main` branch (configure in Cloud Build → Triggers).
#
# Required Cloud Build substitution variables (set in the trigger UI):
#   _SERVICE_NAME          — Cloud Run service name (e.g. "teamsens")
#   _REGION                — Cloud Run region      (e.g. "europe-west1")
#   _REPO                  — Artifact Registry repo (e.g. "europe-west1-docker.pkg.dev/PROJECT/teamsens")
#   _FIREBASE_API_KEY
#   _FIREBASE_AUTH_DOMAIN
#   _FIREBASE_PROJECT_ID
#   _FIREBASE_STORAGE_BUCKET
#   _FIREBASE_MESSAGING_SENDER_ID
#   _FIREBASE_APP_ID
#
# The pipeline:
#   1. Run Go tests
#   2. Build the unified Docker image (Next.js + Go)
#   3. Push to Artifact Registry
#   4. Deploy to Cloud Run

substitutions:
  _SERVICE_NAME: teamsens
  _REGION: europe-west1
  _REPO: europe-west1-docker.pkg.dev/${PROJECT_ID}/teamsens

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Go tests ─────────────────────────────────────────────────────────────
  - id: go-test
    name: golang:1.22-alpine
    entrypoint: go
    args: ["test", "-v", "-race", "-count=1", "./..."]
    env:
      - "CGO_ENABLED=0"

  # ── 2. Build the Docker image ────────────────────────────────────────────────
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --tag=${_REPO}/${_SERVICE_NAME}:latest
      - --cache-from=${_REPO}/${_SERVICE_NAME}:latest
      # Pass Firebase public config as build args (baked into the static JS bundle)
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}
      - --build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - .
    waitFor: [go-test]

  # ── 3. Push to Artifact Registry ─────────────────────────────────────────────
  - id: docker-push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"]
    waitFor: [docker-build]

  - id: docker-push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REPO}/${_SERVICE_NAME}:latest"]
    waitFor: [docker-build]

  # ── 4. Deploy to Cloud Run ────────────────────────────────────────────────────
  - id: cloud-run-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      # Server-side secrets are injected as env vars via Secret Manager
      - --set-secrets=GCP_PROJECT_ID=GCP_PROJECT_ID:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,EMAIL_FROM=EMAIL_FROM:latest
      - --set-env-vars=GCP_REGION=${_REGION},TASK_DRIVER=cloudtasks
    waitFor: [docker-push-sha]

# Images pushed to Artifact Registry
images:
  - ${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REPO}/${_SERVICE_NAME}:latest

# Build timeout: 20 minutes
timeout: 1200s
